<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Timetable - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .day-tabs {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
        }

        .day-tab {
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--bg-light);
            color: var(--text-muted);
            transition: all var(--transition-fast);
            font-family: 'Inter', sans-serif;
        }

        [data-theme="dark"] .day-tab {
            background: rgba(255, 255, 255, 0.06);
        }

        .day-tab:hover {
            color: var(--primary);
        }

        .day-tab.active {
            background: var(--gradient-primary);
            color: white;
        }

        .schedule-list {
            display: grid;
            gap: var(--space-3);
        }

        .schedule-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-4);
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            transition: all var(--transition-fast);
            border-left: 4px solid var(--primary);
        }

        .schedule-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-lg);
        }

        .sch-time {
            background: var(--gradient-primary);
            color: white;
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            min-width: 70px;
        }

        .sch-info {
            flex: 1;
        }

        .sch-course {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .sch-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <div class="day-tabs" id="dayTabs"></div>
                <div class="schedule-list" id="scheduleList">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script>
        const pageRole = AuthManager.getRole();
        const isTeacher = pageRole === 'Teacher';
        const pageTitle = isTeacher ? 'My Timetable' : 'My Timetable';
        const sidebarId = isTeacher ? 'timetable' : 'timetable';

        if (!initPage(pageTitle, sidebarId, 'Student', 'Teacher')) { } else { loadTimetable(); }

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const TODAY_IDX = Math.max(0, Math.min(5, new Date().getDay() - 1));
        let allSlots = [];
        let activeDay = DAYS[TODAY_IDX >= 0 && TODAY_IDX < 6 ? TODAY_IDX : 0];

        async function loadTimetable() {
            const userId = AuthManager.getUserId();
            const endpoint = isTeacher ? `/timeslot/teacher/${userId}` : `/timeslot/student/${userId}`;
            try {
                const data = await AuthManager.apiGet(endpoint);
                allSlots = Array.isArray(data) ? data : [];
            } catch { allSlots = []; }
            renderTabs();
            renderSchedule();
        }

        function renderTabs() {
            document.getElementById('dayTabs').innerHTML = DAYS.map(d =>
                `<button class="day-tab ${d === activeDay ? 'active' : ''}" onclick="changeDay('${d}')">${d}</button>`
            ).join('');
        }

        function changeDay(day) { activeDay = day; renderTabs(); renderSchedule(); }

        function renderSchedule() {
            const daySlots = allSlots.filter(s => s.dayOfWeek === activeDay).sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
            const container = document.getElementById('scheduleList');
            if (!daySlots.length) { container.innerHTML = '<div class="empty-state"><i class="ri-calendar-line"></i><p>No classes on ' + activeDay + '</p></div>'; return; }
            container.innerHTML = daySlots.map(s => `
                <div class="schedule-card">
                    <div class="sch-time">${formatTime(s.startTime)}<br><small>${formatTime(s.endTime)}</small></div>
                    <div class="sch-info">
                        <div class="sch-course">${s.courseName}</div>
                        <div class="sch-details">
                            <span><i class="ri-map-pin-line"></i> Room ${s.roomNumber}</span>
                            <span><i class="ri-user-line"></i> ${s.teacherName}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatTime(t) {
            if (!t) return '';
            const p = t.split(':'); let h = parseInt(p[0]); const m = p[1];
            const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            return `${h}:${m} ${ap}`;
        }
    </script>
</body>

</html>
