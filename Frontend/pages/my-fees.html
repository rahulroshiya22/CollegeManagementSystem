<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fees - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .fee-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .fee-stat {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .fee-stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
        }

        .fee-stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fee-row {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-4);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-3);
            display: flex;
            align-items: center;
            gap: var(--space-4);
            transition: all var(--transition-fast);
        }

        .fee-row:hover {
            transform: translateX(4px);
        }

        .fee-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            flex-shrink: 0;
        }

        .fee-details {
            flex: 1;
        }

        .fee-desc {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .fee-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .fee-amount-col {
            text-align: right;
        }

        .fee-amt {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .fee-due {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <div class="fee-summary" id="feeSummary">
                    <div class="fee-stat">
                        <div class="fee-stat-value" id="totalFee">₹--</div>
                        <div class="fee-stat-label">Total Fees</div>
                    </div>
                    <div class="fee-stat">
                        <div class="fee-stat-value" style="color:var(--success)" id="paidFee">₹--</div>
                        <div class="fee-stat-label">Paid</div>
                    </div>
                    <div class="fee-stat">
                        <div class="fee-stat-value" style="color:var(--error)" id="pendingFee">₹--</div>
                        <div class="fee-stat-label">Pending</div>
                    </div>
                </div>
                <h5 style="font-weight:700;margin-bottom:var(--space-4)"><i class="ri-bill-fill"
                        style="color:var(--primary)"></i> Fee Records</h5>
                <div id="feeList">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('My Fees', 'my-fees', 'Student')) { } else { loadFees(); }
        async function loadFees() {
            const sid = AuthManager.getUserId();
            try {
                const fees = await AuthManager.apiGet(`/fee/student/${sid}`);
                const list = Array.isArray(fees) ? fees : [];
                let totalPaid = 0, totalPending = 0;
                list.forEach(f => { if (f.status === 'Paid') totalPaid += f.amount; else totalPending += f.amount; });
                document.getElementById('totalFee').textContent = `₹${(totalPaid + totalPending).toLocaleString()}`;
                document.getElementById('paidFee').textContent = `₹${totalPaid.toLocaleString()}`;
                document.getElementById('pendingFee').textContent = `₹${totalPending.toLocaleString()}`;

                const container = document.getElementById('feeList');
                if (!list.length) { container.innerHTML = '<div class="empty-state"><i class="ri-money-dollar-circle-line"></i><p>No fees</p></div>'; return; }
                container.innerHTML = list.map(f => {
                    const isPaid = f.status === 'Paid';
                    return `<div class="fee-row">
                        <div class="fee-icon" style="background:${isPaid ? 'var(--gradient-green)' : 'var(--gradient-orange)'}">
                            <i class="${isPaid ? 'ri-check-double-fill' : 'ri-time-fill'}"></i>
                        </div>
                        <div class="fee-details">
                            <div class="fee-desc">${f.description || f.feeType || 'Fee'}</div>
                            <div class="fee-meta">${f.feeType || ''} · ${f.semester ? 'Sem ' + f.semester : ''} · ${f.academicYear || ''}</div>
                        </div>
                        <div class="fee-amount-col">
                            <div class="fee-amt">₹${f.amount?.toLocaleString()}</div>
                            <div class="fee-due">${isPaid ? 'Paid' : 'Due: ' + new Date(f.dueDate).toLocaleDateString()}</div>
                        </div>
                        <span class="badge ${isPaid ? 'badge-success' : 'badge-warning'}">${f.status}</span>
                    </div>`;
                }).join('');
            } catch { document.getElementById('feeList').innerHTML = '<div class="empty-state"><p>Could not load fees</p></div>'; }
        }
    </script>
</body>

</html>
