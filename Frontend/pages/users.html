<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - College Management System</title>
    <meta name="description" content="Admin user management panel - Create, edit, and manage user accounts">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .action-btn {
            padding: var(--space-1) var(--space-2);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .btn-edit {
            background: var(--info-light);
            color: var(--info);
        }

        .btn-delete {
            background: var(--error-light);
            color: var(--error);
        }

        .btn-success {
            background: var(--success-light);
            color: var(--success);
        }

        .role-badge {
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: linear-gradient(135deg, rgba(245, 87, 108, 0.15), rgba(240, 147, 251, 0.15));
            color: #f5576c;
        }

        .role-teacher {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.15), rgba(0, 242, 254, 0.15));
            color: #4facfe;
        }

        .role-student {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.15), rgba(56, 249, 215, 0.15));
            color: #38a169;
        }

        .status-active {
            color: var(--success);
        }

        .status-inactive {
            color: var(--error);
        }

        .filter-bar {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: var(--space-2) var(--space-3);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-light);
            font-size: 0.85rem;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        [data-theme="dark"] .filter-bar select {
            background: rgba(255, 255, 255, 0.06);
        }

        .filter-bar select:focus {
            border-color: var(--primary);
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            margin-top: var(--space-5);
        }

        .page-btn {
            padding: var(--space-2) var(--space-3);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
            background: var(--bg-light);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        [data-theme="dark"] .page-btn {
            background: rgba(255, 255, 255, 0.06);
        }

        .page-btn:hover {
            background: var(--primary);
            color: white;
        }

        .page-btn.active {
            background: var(--gradient-primary);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <!-- Action Bar -->
                <div class="action-bar">
                    <div class="filter-bar">
                        <div class="search-bar">
                            <i class="ri-search-line"></i>
                            <input type="text" id="searchInput" placeholder="Search users..."
                                oninput="debounceSearch()">
                        </div>
                        <select id="roleFilter" onchange="loadUsers()">
                            <option value="">All Roles</option>
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Admin">Admin</option>
                        </select>
                        <select id="statusFilter" onchange="loadUsers()">
                            <option value="">All Status</option>
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="openCreateModal()">
                        <i class="ri-user-add-fill"></i> Add User
                    </button>
                </div>

                <!-- Users Table -->
                <div class="data-table-container">
                    <div class="data-table-header">
                        <h5 class="data-table-title">All Users</h5>
                        <span class="text-muted" style="font-size:0.8rem" id="totalCount">0 users</span>
                    </div>
                    <div style="overflow-x:auto">
                        <table class="data-table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <tr>
                                    <td colspan="6">
                                        <div class="loading-spinner">
                                            <div class="spinner"></div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- Create / Edit Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="editUserId">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" required>
                    </div>
                    <div class="form-group" id="passwordGroup">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select class="form-input" id="role">
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('User Management', 'users', 'Admin')) { /* redirect */ }
        else { loadUsers(); }

        let currentPage = 1;
        let searchTimeout;

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentPage = 1; loadUsers(); }, 400);
        }

        async function loadUsers() {
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value;

            let query = `?page=${currentPage}&pageSize=15`;
            if (role) query += `&role=${role}`;
            if (status) query += `&isActive=${status}`;
            if (search) query += `&search=${encodeURIComponent(search)}`;

            try {
                const result = await AuthManager.apiGet(`/admin/users${query}`);
                const users = result?.data || [];
                const totalCount = result?.totalCount || 0;
                const totalPages = result?.totalPages || 1;

                document.getElementById('totalCount').textContent = `${totalCount} users`;

                const tbody = document.getElementById('usersBody');
                if (!users.length) {
                    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="ri-user-line"></i><p>No users found</p></div></td></tr>';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>
                            <div style="display:flex;align-items:center;gap:8px">
                                <div style="width:32px;height:32px;border-radius:50%;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;color:white;font-size:0.75rem;font-weight:700">
                                    ${(u.firstName?.[0] || 'U').toUpperCase()}
                                </div>
                                <span style="font-weight:600">${u.firstName || ''} ${u.lastName || ''}</span>
                            </div>
                        </td>
                        <td>${u.email}</td>
                        <td><span class="role-badge role-${(u.role || 'student').toLowerCase()}">${u.role}</span></td>
                        <td><span class="${u.isActive ? 'status-active' : 'status-inactive'}"><i class="${u.isActive ? 'ri-checkbox-circle-fill' : 'ri-close-circle-fill'}"></i> ${u.isActive ? 'Active' : 'Inactive'}</span></td>
                        <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick='editUser(${JSON.stringify(u)})'><i class="ri-pencil-fill"></i></button>
                            ${u.isActive
                        ? `<button class="action-btn btn-delete" onclick="toggleStatus(${u.userId}, false)"><i class="ri-forbid-fill"></i></button>`
                        : `<button class="action-btn btn-success" onclick="toggleStatus(${u.userId}, true)"><i class="ri-check-fill"></i></button>`
                    }
                        </td>
                    </tr>
                `).join('');

                // Pagination
                let pagHtml = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}><i class="ri-arrow-left-s-line"></i></button>`;
                for (let p = 1; p <= totalPages; p++) {
                    if (totalPages > 7 && Math.abs(p - currentPage) > 2 && p !== 1 && p !== totalPages) {
                        if (p === 2 || p === totalPages - 1) pagHtml += '<span style="padding:0 4px">...</span>';
                        continue;
                    }
                    pagHtml += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                }
                pagHtml += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}><i class="ri-arrow-right-s-line"></i></button>`;
                document.getElementById('pagination').innerHTML = pagHtml;

            } catch (err) {
                console.error('Load users error:', err);
                document.getElementById('usersBody').innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>Error loading users</p></div></td></tr>';
            }
        }

        function goToPage(page) { currentPage = page; loadUsers(); }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Add User';
            document.getElementById('userForm').reset();
            document.getElementById('editUserId').value = '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('password').required = true;
            document.getElementById('userModal').classList.add('show');
        }

        function editUser(user) {
            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('editUserId').value = user.userId;
            document.getElementById('firstName').value = user.firstName || '';
            document.getElementById('lastName').value = user.lastName || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('role').value = user.role || 'Student';
            document.getElementById('password').value = '';
            document.getElementById('password').required = false;
            document.getElementById('userModal').classList.add('show');
        }

        function closeModal() { document.getElementById('userModal').classList.remove('show'); }

        async function saveUser() {
            const id = document.getElementById('editUserId').value;
            const body = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
            };

            const password = document.getElementById('password').value;
            if (password) body.password = password;

            try {
                if (id) {
                    await AuthManager.apiPut(`/admin/users/${id}`, body);
                    showToast('User updated successfully', 'success');
                } else {
                    body.password = password || 'Default@123';
                    await AuthManager.apiPost('/admin/users', body);
                    showToast('User created successfully', 'success');
                }
                closeModal();
                loadUsers();
            } catch (err) {
                showToast(err.message || 'Error saving user', 'error');
            }
        }

        async function toggleStatus(userId, activate) {
            try {
                if (activate) {
                    await AuthManager.apiPost(`/admin/users/${userId}/activate`, {});
                    showToast('User activated', 'success');
                } else {
                    await AuthManager.apiDelete(`/admin/users/${userId}`);
                    showToast('User deactivated', 'warning');
                }
                loadUsers();
            } catch (err) {
                showToast(err.message || 'Error updating status', 'error');
            }
        }
    </script>
</body>

</html>
