<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Grades - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .course-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .course-card {
            background: var(--bg-secondary);
            border: 2px solid transparent;
            border-radius: var(--radius-xl);
            padding: var(--space-4);
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .course-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .course-card.selected {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }

        .cs-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .cs-code {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .grade-form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr auto;
            gap: var(--space-3);
            align-items: center;
            padding: var(--space-3);
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-2);
            box-shadow: var(--shadow-sm);
        }

        .grade-form-row input,
        .grade-form-row select {
            padding: var(--space-2);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-light);
            font-size: 0.85rem;
            color: var(--text-primary);
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        [data-theme="dark"] .grade-form-row input,
        [data-theme="dark"] .grade-form-row select {
            background: rgba(255, 255, 255, 0.06);
        }

        .grade-form-row input:focus,
        .grade-form-row select:focus {
            border-color: var(--primary);
        }

        .student-name {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .student-id {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .grade-preview {
            font-weight: 800;
            font-size: 0.9rem;
            min-width: 30px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .grade-form-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <!-- Step 1: Select Course -->
                <div id="stepSelect">
                    <h5 style="font-weight:700;margin-bottom:var(--space-4)">Select Course to Grade</h5>
                    <div class="course-select-grid" id="courseGrid">
                        <div class="loading-spinner">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Enter Grades -->
                <div id="stepGrade" style="display:none">
                    <div class="action-bar">
                        <div>
                            <h5 style="font-weight:700;margin:0" id="selectedCourseName">Course</h5>
                            <p style="font-size:0.8rem;color:var(--text-muted);margin:0">Enter marks for each student
                            </p>
                        </div>
                        <div style="display:flex;gap:var(--space-3)">
                            <select class="form-input" id="examType"
                                style="width:auto;padding:var(--space-2) var(--space-3)">
                                <option value="Midterm">Midterm</option>
                                <option value="Final">Final</option>
                                <option value="Internal">Internal</option>
                                <option value="Assignment">Assignment</option>
                            </select>
                            <button class="btn btn-ghost btn-sm" onclick="goBack()"><i class="ri-arrow-left-line"></i>
                                Back</button>
                        </div>
                    </div>

                    <div
                        style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:var(--space-3);padding:var(--space-2) var(--space-3);font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">
                        <span>Student</span><span>Marks</span><span>Total</span><span>Semester</span><span>Grade</span>
                    </div>
                    <div id="gradeList">
                        <div class="loading-spinner">
                            <div class="spinner"></div>
                        </div>
                    </div>

                    <div style="text-align:center;margin-top:var(--space-6)">
                        <button class="btn btn-primary btn-lg" onclick="submitGrades()"><i class="ri-check-fill"></i>
                            Submit Grades</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('Manage Grades', 'grades', 'Teacher')) { } else { loadCourses(); }

        let selectedCourse = null;
        let gradeEntries = [];

        async function loadCourses() {
            const userId = AuthManager.getUserId();
            try {
                const courses = await AuthManager.apiGet(`/course/teacher/${userId}`);
                const list = Array.isArray(courses) ? courses : [];
                const grid = document.getElementById('courseGrid');
                if (!list.length) { grid.innerHTML = '<div class="empty-state"><p>No courses assigned</p></div>'; return; }
                grid.innerHTML = list.map(c => `
                    <div class="course-card" onclick="selectCourse(${c.courseId}, '${c.courseName}', '${c.courseCode}', ${c.semester || 1})">
                        <div class="cs-name">${c.courseName}</div>
                        <div class="cs-code">${c.courseCode} · Sem ${c.semester || '-'}</div>
                    </div>
                `).join('');
            } catch { document.getElementById('courseGrid').innerHTML = '<div class="empty-state"><p>Could not load courses</p></div>'; }
        }

        async function selectCourse(courseId, courseName, courseCode, semester) {
            selectedCourse = { courseId, courseName, courseCode, semester };
            document.getElementById('selectedCourseName').textContent = `${courseName} (${courseCode})`;
            document.getElementById('stepSelect').style.display = 'none';
            document.getElementById('stepGrade').style.display = 'block';

            try {
                const enrollments = await AuthManager.apiGet(`/enrollment/course/${courseId}`);
                const students = Array.isArray(enrollments) ? enrollments : [];
                gradeEntries = students.map(s => ({ studentId: s.studentId, studentName: s.studentName || `Student #${s.studentId}`, marks: '', totalMarks: '100', semester }));
                renderGradeForm();
            } catch { document.getElementById('gradeList').innerHTML = '<div class="empty-state"><p>No students</p></div>'; }
        }

        function renderGradeForm() {
            const container = document.getElementById('gradeList');
            if (!gradeEntries.length) { container.innerHTML = '<div class="empty-state"><p>No enrolled students</p></div>'; return; }
            container.innerHTML = gradeEntries.map((e, i) => `
                <div class="grade-form-row">
                    <div><div class="student-name">${e.studentName}</div><div class="student-id">ID: ${e.studentId}</div></div>
                    <input type="number" min="0" max="100" placeholder="Marks" value="${e.marks}" oninput="updateGrade(${i}, this.value)">
                    <input type="number" min="1" value="${e.totalMarks}" oninput="gradeEntries[${i}].totalMarks=this.value;updateGrade(${i},gradeEntries[${i}].marks)">
                    <input type="number" min="1" max="8" value="${e.semester}" oninput="gradeEntries[${i}].semester=parseInt(this.value)">
                    <span class="grade-preview" id="preview${i}">-</span>
                </div>
            `).join('');
        }

        function updateGrade(index, marks) {
            gradeEntries[index].marks = marks;
            const total = parseInt(gradeEntries[index].totalMarks) || 100;
            const m = parseFloat(marks);
            const preview = document.getElementById(`preview${index}`);
            if (isNaN(m)) { preview.textContent = '-'; preview.style.color = ''; return; }
            const pct = (m / total) * 100;
            let grade = 'F', color = 'var(--error)';
            if (pct >= 90) { grade = 'A+'; color = 'var(--success)'; }
            else if (pct >= 80) { grade = 'A'; color = 'var(--success)'; }
            else if (pct >= 70) { grade = 'B+'; color = 'var(--info)'; }
            else if (pct >= 60) { grade = 'B'; color = 'var(--info)'; }
            else if (pct >= 50) { grade = 'C+'; color = 'var(--warning)'; }
            else if (pct >= 40) { grade = 'C'; color = 'var(--warning)'; }
            else if (pct >= 33) { grade = 'D'; color = '#ed8936'; }
            preview.textContent = grade;
            preview.style.color = color;
        }

        async function submitGrades() {
            if (!selectedCourse) return;
            const examType = document.getElementById('examType').value;
            const grades = gradeEntries.filter(e => e.marks !== '').map(e => ({
                studentId: e.studentId,
                courseId: selectedCourse.courseId,
                courseName: selectedCourse.courseName,
                marksObtained: parseFloat(e.marks),
                totalMarks: parseFloat(e.totalMarks) || 100,
                semester: parseInt(e.semester) || selectedCourse.semester,
                academicYear: new Date().getFullYear() + '-' + (new Date().getFullYear() + 1),
                examType
            }));

            if (!grades.length) { showToast('Enter at least one grade', 'warning'); return; }

            try {
                await AuthManager.apiPost('/grade/bulk', { grades });
                showToast(`${grades.length} grades submitted!`, 'success');
                goBack();
            } catch (err) {
                showToast(err.message || 'Error submitting grades', 'error');
            }
        }

        function goBack() {
            document.getElementById('stepSelect').style.display = 'block';
            document.getElementById('stepGrade').style.display = 'none';
            selectedCourse = null;
        }
    </script>
</body>

</html>
