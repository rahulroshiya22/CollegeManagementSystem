<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--space-4);
        }

        .course-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
        }

        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
        }

        .course-card-top {
            padding: var(--space-4) var(--space-5);
            position: relative;
            color: white;
        }

        .course-card:nth-child(6n+1) .course-card-top {
            background: var(--gradient-primary);
        }

        .course-card:nth-child(6n+2) .course-card-top {
            background: var(--gradient-green);
        }

        .course-card:nth-child(6n+3) .course-card-top {
            background: var(--gradient-blue);
        }

        .course-card:nth-child(6n+4) .course-card-top {
            background: var(--gradient-orange);
        }

        .course-card:nth-child(6n+5) .course-card-top {
            background: var(--gradient-accent);
        }

        .course-card:nth-child(6n+6) .course-card-top {
            background: var(--gradient-dark);
        }

        .cc-code {
            font-size: 0.7rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cc-name {
            font-size: 1rem;
            font-weight: 700;
            margin-top: var(--space-1);
        }

        .course-card-body {
            padding: var(--space-4) var(--space-5);
        }

        .cc-detail {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: var(--space-2);
        }

        .cc-detail i {
            color: var(--primary);
            width: 16px;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <div class="courses-grid" id="coursesGrid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('My Courses', 'my-courses', 'Student')) { } else { loadCourses(); }

        async function loadCourses() {
            const studentId = AuthManager.getUserId();
            try {
                const enrollments = await AuthManager.apiGet(`/enrollment/student/${studentId}`);
                const list = Array.isArray(enrollments) ? enrollments : [];
                const grid = document.getElementById('coursesGrid');
                if (!list.length) { grid.innerHTML = '<div class="empty-state"><i class="ri-book-line"></i><p>No courses enrolled</p></div>'; return; }
                grid.innerHTML = list.map(e => `
                    <div class="course-card">
                        <div class="course-card-top">
                            <div class="cc-code">${e.courseCode || 'COURSE'}</div>
                            <div class="cc-name">${e.courseName || 'Course ' + e.courseId}</div>
                        </div>
                        <div class="course-card-body">
                            <div class="cc-detail"><i class="ri-calendar-line"></i> Semester ${e.semester || '-'}</div>
                            <div class="cc-detail"><i class="ri-bookmark-line"></i> Status: ${e.status || 'Enrolled'}</div>
                            <div class="cc-detail"><i class="ri-time-line"></i> Enrolled: ${e.enrollmentDate ? new Date(e.enrollmentDate).toLocaleDateString() : '-'}</div>
                        </div>
                    </div>
                `).join('');
            } catch { document.getElementById('coursesGrid').innerHTML = '<div class="empty-state"><p>Could not load courses</p></div>'; }
        }
    </script>
</body>

</html>
