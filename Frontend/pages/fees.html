<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Management - College Management System</title>

    <!-- CSS Files -->
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/3d-effects.css">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        body {
            background: var(--bg-light);
        }

        .dashboard-layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: var(--space-6);
            width: calc(100% - 260px);
            max-width: 1600px;
            min-height: 100vh;
            box-sizing: border-box;
            transition: margin-left var(--transition-base);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-8);
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .page-title h1 {
            margin: 0;
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-8);
        }

        .stat-mini {
            background: var(--bg-secondary);
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--primary);
        }

        .stat-mini.pending {
            border-left-color: var(--warning);
        }

        .stat-mini.paid {
            border-left-color: var(--success);
        }

        .stat-mini.overdue {
            border-left-color: var(--error);
        }

        .stat-mini-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: var(--space-1);
        }

        .stat-mini-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .fees-container {
            background: var(--bg-secondary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .status-badge-pending {
            background: var(--warning-light);
            color: var(--warning);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge-paid {
            background: var(--success-light);
            color: var(--success);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge-overdue {
            background: var(--error-light);
            color: var(--error);
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">

        <!-- Sidebar (same as other pages) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="ri-graduation-cap-fill"></i><span>CollegeMS</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="sidebar-link"><i
                        class="ri-dashboard-fill"></i><span>Dashboard</span></a>
                <a href="students.html" class="sidebar-link"><i class="ri-group-fill"></i><span>Students</span></a>
                <a href="courses.html" class="sidebar-link"><i class="ri-book-open-fill"></i><span>Courses</span></a>
                <a href="enrollment.html" class="sidebar-link"><i
                        class="ri-file-list-fill"></i><span>Enrollment</span></a>
                <a href="fees.html" class="sidebar-link active"><i
                        class="ri-money-dollar-circle-fill"></i><span>Fees</span></a>
                <a href="attendance.html" class="sidebar-link"><i
                        class="ri-calendar-check-fill"></i><span>Attendance</span></a>
                <a href="ai-assistant.html" class="sidebar-link"><i class="ri-robot-2-fill"></i><span>AI
                        Assistant</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="sidebar-link"><i class="ri-home-fill"></i><span>Back to Home</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Header -->
            <div class="page-header animate-fade-in-down">
                <div class="page-title">
                    <h1>💰 Fee Management</h1>
                    <p class="page-subtitle">Auto-generated fees from enrollment events via RabbitMQ</p>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="stats-row animate-fade-in-up">
                <div class="stat-mini pending">
                    <div class="stat-mini-label">Pending Fees</div>
                    <div class="stat-mini-value" id="pendingCount">0</div>
                </div>
                <div class="stat-mini paid">
                    <div class="stat-mini-label">Paid Fees</div>
                    <div class="stat-mini-value" id="paidCount">0</div>
                </div>
                <div class="stat-mini overdue">
                    <div class="stat-mini-label">Overdue Fees</div>
                    <div class="stat-mini-value" id="overdueCount">0</div>
                </div>
                <div class="stat-mini">
                    <div class="stat-mini-label">Total Amount</div>
                    <div class="stat-mini-value" id="totalAmount">$0</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar animate-fade-in-up">
                <div class="search-box">
                    <i class="ri-search-line"></i>
                    <input type="text" id="searchInput" placeholder="Search fees..." onkeyup="filterFees()">
                </div>
                <select class="form-select" id="statusFilter" onchange="filterFees()" style="max-width: 200px;">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Paid">Paid</option>
                    <option value="Overdue">Overdue</option>
                </select>
            </div>

            <!-- Fees Table -->
            <div class="fees-container animate-fade-in-up">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Fee ID</th>
                                <th>Student</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="feesTableBody">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/3d-effects.js"></script>

    <script>
        let fees = [];
        let filteredFees = [];
        let students = [];

        async function initPage() {
            await loadFees();
        }

        async function loadFees() {
            try {
                showToast('Loading fees...', 'info', 2000);
                // Load fees and students in parallel
                [fees, students] = await Promise.all([
                    api.getFees(),
                    api.getStudents()
                ]);
                filteredFees = [...fees];
                calculateStats();
                renderTable();
                showToast('Fees loaded successfully!', 'success');
            } catch (error) {
                console.error('Error loading fees:', error);
                showToast('Failed to load fees', 'error');
                fees = [];
                filteredFees = [];
                students = [];
                renderTable();
            }
        }

        function calculateStats() {
            const pending = fees.filter(f => f.status === 'Pending').length;
            const paid = fees.filter(f => f.status === 'Paid').length;
            const overdue = fees.filter(f => f.status === 'Overdue').length;
            const total = fees.reduce((sum, f) => sum + (f.amount || 0), 0);

            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('paidCount').textContent = paid;
            document.getElementById('overdueCount').textContent = overdue;
            document.getElementById('totalAmount').textContent = formatCurrency(total);
        }

        function renderTable() {
            const tbody = document.getElementById('feesTableBody');

            if (filteredFees.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">💰</div><h3>No Fees Found</h3><p>Fees are auto-generated when students are enrolled.</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = filteredFees.map(fee => {
                const statusClass = fee.status?.toLowerCase() || 'pending';

                // Find student name
                const student = students.find(s => s.studentId === fee.studentId);
                const studentName = student ? `${student.firstName} ${student.lastName}` : `Student #${fee.studentId}`;
                const studentEmail = student ? student.email : '';

                return `
          <tr>
            <td><strong>#${fee.feeId}</strong></td>
            <td>
              <strong>${studentName}</strong>
              ${studentEmail ? `<br><small style="color: var(--text-muted);">${studentEmail}</small>` : ''}
            </td>
            <td>${fee.description || 'Course Fee'}</td>
            <td><strong>${formatCurrency(fee.amount || 0)}</strong></td>
            <td>${formatDate(fee.dueDate)}</td>
            <td><span class="status-badge-${statusClass}">${fee.status || 'Pending'}</span></td>
            <td>
              ${fee.status !== 'Paid' ? `<button class="btn btn-sm btn-primary" onclick="markAsPaid(${fee.feeId})"><i class="ri-check-fill"></i> Pay</button>` : '<span style="color: var(--success);">✓ Paid</span>'}
            </td>
          </tr>
        `;
            }).join('');
        }

        function filterFees() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;

            filteredFees = fees.filter(fee => {
                const matchesSearch = !searchTerm || fee.feeId?.toString().includes(searchTerm);
                const matchesStatus = !statusFilter || fee.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            renderTable();
        }

        async function markAsPaid(id) {
            try {
                await api.updateFee(id, { feeId: id, status: 'Paid', paidDate: new Date().toISOString() });
                showToast('Fee marked as paid!', 'success');
                await loadFees();
            } catch (error) {
                console.error('Error updating fee:', error);
                showToast('Failed to update fee', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
