<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices - College Management System</title>
    <meta name="description" content="View and manage college notices and announcements">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .notices-grid {
            display: grid;
            gap: var(--space-4);
        }

        .notice-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            box-shadow: var(--shadow-md);
            border-left: 4px solid var(--primary);
            transition: all var(--transition-base);
        }

        .notice-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .notice-card.urgent {
            border-left-color: var(--error);
        }

        .notice-card.academic {
            border-left-color: var(--info);
        }

        .notice-card.event {
            border-left-color: var(--success);
        }

        .notice-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--space-3);
            gap: var(--space-3);
        }

        .notice-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .notice-meta {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            flex-wrap: wrap;
            margin-top: var(--space-2);
        }

        .notice-meta span {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .notice-content {
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.7;
            margin-top: var(--space-3);
        }

        .category-badge {
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cat-general {
            background: rgba(102, 126, 234, 0.12);
            color: var(--primary);
        }

        .cat-academic {
            background: rgba(66, 153, 225, 0.12);
            color: var(--info);
        }

        .cat-event {
            background: rgba(72, 187, 120, 0.12);
            color: var(--success);
        }

        .cat-urgent {
            background: rgba(245, 101, 101, 0.12);
            color: var(--error);
        }

        .filter-bar {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: var(--space-2) var(--space-3);
            border: 2px solid transparent;
            border-radius: var(--radius-md);
            background: var(--bg-light);
            font-size: 0.85rem;
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        [data-theme="dark"] .filter-bar select {
            background: rgba(255, 255, 255, 0.06);
        }

        .notice-actions {
            display: flex;
            gap: var(--space-2);
        }

        .action-btn {
            padding: var(--space-1) var(--space-2);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition-fast);
        }

        .btn-edit {
            background: var(--info-light);
            color: var(--info);
        }

        .btn-delete {
            background: var(--error-light);
            color: var(--error);
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <!-- Action Bar -->
                <div class="action-bar">
                    <div class="filter-bar">
                        <select id="categoryFilter" onchange="loadNotices()">
                            <option value="">All Categories</option>
                            <option value="General">General</option>
                            <option value="Academic">Academic</option>
                            <option value="Event">Event</option>
                            <option value="Urgent">Urgent</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" id="addNoticeBtn" onclick="openCreateModal()" style="display:none">
                        <i class="ri-add-fill"></i> Post Notice
                    </button>
                </div>

                <!-- Notices List -->
                <div class="notices-grid" id="noticesGrid">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Notice Modal -->
    <div class="modal-overlay" id="noticeModal">
        <div class="modal">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Post Notice</h5>
                <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="noticeForm">
                    <input type="hidden" id="editNoticeId">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-input" id="noticeTitle" required placeholder="Notice title...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Content</label>
                        <textarea class="form-input" id="noticeContent" rows="5" required
                            placeholder="Notice content..." style="resize:vertical;min-height:120px"></textarea>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-input" id="noticeCategory">
                                <option value="General">General</option>
                                <option value="Academic">Academic</option>
                                <option value="Event">Event</option>
                                <option value="Urgent">Urgent</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Target Audience</label>
                            <select class="form-input" id="noticeAudience">
                                <option value="All">All</option>
                                <option value="Students">Students</option>
                                <option value="Teachers">Teachers</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expiry Date (optional)</label>
                        <input type="date" class="form-input" id="noticeExpiry">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveNotice()">Publish</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('Notices', 'notices')) { /* redirect */ }
        else {
            // Show add button for Admin/Teacher
            if (AuthManager.isAdmin() || AuthManager.isTeacher()) {
                document.getElementById('addNoticeBtn').style.display = 'inline-flex';
            }
            loadNotices();
        }

        async function loadNotices() {
            const category = document.getElementById('categoryFilter').value;
            const role = AuthManager.getRole();
            let query = '';
            if (category) query += `?category=${category}`;
            if (role) query += `${query ? '&' : '?'}audience=${role}`;

            try {
                const notices = await AuthManager.apiGet(`/notice${query}`);
                const list = Array.isArray(notices) ? notices : [];
                const grid = document.getElementById('noticesGrid');

                if (!list.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="ri-notification-off-fill" style="font-size:3rem"></i><p>No notices found</p></div>';
                    return;
                }

                grid.innerHTML = list.map(n => {
                    const cat = (n.category || 'general').toLowerCase();
                    const isOwner = AuthManager.isAdmin() || (n.postedByUserId === AuthManager.getUserId());
                    return `
                        <div class="notice-card ${cat}">
                            <div class="notice-header">
                                <div>
                                    <h5 class="notice-title">${n.title}</h5>
                                    <div class="notice-meta">
                                        <span class="category-badge cat-${cat}">${n.category}</span>
                                        <span><i class="ri-user-line"></i> ${n.postedByName || 'Admin'}</span>
                                        <span><i class="ri-time-line"></i> ${new Date(n.createdAt).toLocaleDateString()}</span>
                                        <span><i class="ri-group-line"></i> ${n.targetAudience}</span>
                                    </div>
                                </div>
                                ${isOwner ? `
                                <div class="notice-actions">
                                    <button class="action-btn btn-edit" onclick='editNotice(${JSON.stringify(n)})'><i class="ri-pencil-fill"></i></button>
                                    <button class="action-btn btn-delete" onclick="deleteNotice(${n.noticeId})"><i class="ri-delete-bin-fill"></i></button>
                                </div>` : ''}
                            </div>
                            <div class="notice-content">${n.content}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Load notices error:', err);
                document.getElementById('noticesGrid').innerHTML = '<div class="empty-state"><p>Could not load notices</p></div>';
            }
        }

        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Post Notice';
            document.getElementById('noticeForm').reset();
            document.getElementById('editNoticeId').value = '';
            document.getElementById('noticeModal').classList.add('show');
        }

        function editNotice(notice) {
            document.getElementById('modalTitle').textContent = 'Edit Notice';
            document.getElementById('editNoticeId').value = notice.noticeId;
            document.getElementById('noticeTitle').value = notice.title || '';
            document.getElementById('noticeContent').value = notice.content || '';
            document.getElementById('noticeCategory').value = notice.category || 'General';
            document.getElementById('noticeAudience').value = notice.targetAudience || 'All';
            if (notice.expiryDate) document.getElementById('noticeExpiry').value = notice.expiryDate.split('T')[0];
            document.getElementById('noticeModal').classList.add('show');
        }

        function closeModal() { document.getElementById('noticeModal').classList.remove('show'); }

        async function saveNotice() {
            const id = document.getElementById('editNoticeId').value;
            const user = AuthManager.getUser();
            const body = {
                title: document.getElementById('noticeTitle').value,
                content: document.getElementById('noticeContent').value,
                category: document.getElementById('noticeCategory').value,
                targetAudience: document.getElementById('noticeAudience').value,
                postedByUserId: user?.userId || 0,
                postedByName: AuthManager.getFullName(),
            };
            const expiry = document.getElementById('noticeExpiry').value;
            if (expiry) body.expiryDate = expiry;

            try {
                if (id) {
                    await AuthManager.apiPut(`/notice/${id}`, body);
                    showToast('Notice updated', 'success');
                } else {
                    await AuthManager.apiPost('/notice', body);
                    showToast('Notice published', 'success');
                }
                closeModal();
                loadNotices();
            } catch (err) {
                showToast(err.message || 'Error saving notice', 'error');
            }
        }

        async function deleteNotice(id) {
            if (!confirm('Delete this notice?')) return;
            try {
                await AuthManager.apiDelete(`/notice/${id}`);
                showToast('Notice deleted', 'success');
                loadNotices();
            } catch (err) {
                showToast(err.message || 'Error deleting notice', 'error');
            }
        }
    </script>
</body>

</html>
