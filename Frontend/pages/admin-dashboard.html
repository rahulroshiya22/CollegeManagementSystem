<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - College Management System</title>
    <meta name="description"
        content="Admin Dashboard for College Management System - Manage students, teachers, courses and more">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--space-5);
            margin-bottom: var(--space-6);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .recent-list {
            list-style: none;
            padding: 0;
        }

        .recent-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] .recent-item {
            border-bottom-color: rgba(255, 255, 255, 0.04);
        }

        .recent-item:last-child {
            border-bottom: none;
        }

        .recent-avatar {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .recent-info {
            flex: 1;
            min-width: 0;
        }

        .recent-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recent-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .quick-action-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-base);
            border: 1px solid transparent;
            text-decoration: none;
            color: var(--text-primary);
        }

        .quick-action-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .quick-action-icon {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto var(--space-3);
            color: white;
        }

        .quick-action-label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: var(--space-4);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .section-title i {
            color: var(--primary);
        }

        .panel {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            box-shadow: var(--shadow-md);
        }

        .fee-bar {
            height: 8px;
            background: var(--bg-light);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-top: var(--space-2);
        }

        [data-theme="dark"] .fee-bar {
            background: rgba(255, 255, 255, 0.08);
        }

        .fee-bar-fill {
            height: 100%;
            background: var(--gradient-green);
            border-radius: var(--radius-full);
            transition: width 1s ease-out;
        }

        .fee-stats {
            display: flex;
            justify-content: space-between;
            margin-top: var(--space-2);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="layout" id="layout">
        <!-- Sidebar -->
        <div id="sidebarContainer"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div id="headerContainer"></div>

            <!-- Page Body -->
            <div class="page-body">
                <!-- Stats Cards -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-label">Total Students</span>
                            <div class="stat-icon"><i class="ri-user-3-fill"></i></div>
                        </div>
                        <p class="stat-value" id="statStudents">--</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-label">Total Teachers</span>
                            <div class="stat-icon"><i class="ri-user-star-fill"></i></div>
                        </div>
                        <p class="stat-value" id="statTeachers">--</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-label">Active Courses</span>
                            <div class="stat-icon"><i class="ri-book-2-fill"></i></div>
                        </div>
                        <p class="stat-value" id="statCourses">--</p>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-label">Total Users</span>
                            <div class="stat-icon"><i class="ri-group-fill"></i></div>
                        </div>
                        <p class="stat-value" id="statUsers">--</p>
                    </div>
                </div>

                <!-- Quick Actions -->
                <h5 class="section-title"><i class="ri-flashlight-fill"></i> Quick Actions</h5>
                <div class="quick-actions">
                    <a class="quick-action-card" href="users.html">
                        <div class="quick-action-icon" style="background: var(--gradient-primary)">
                            <i class="ri-user-add-fill"></i>
                        </div>
                        <span class="quick-action-label">Manage Users</span>
                    </a>
                    <a class="quick-action-card" href="courses.html">
                        <div class="quick-action-icon" style="background: var(--gradient-green)">
                            <i class="ri-book-2-fill"></i>
                        </div>
                        <span class="quick-action-label">Manage Courses</span>
                    </a>
                    <a class="quick-action-card" href="timetable-manage.html">
                        <div class="quick-action-icon" style="background: var(--gradient-blue)">
                            <i class="ri-calendar-schedule-fill"></i>
                        </div>
                        <span class="quick-action-label">Timetable</span>
                    </a>
                    <a class="quick-action-card" href="fees.html">
                        <div class="quick-action-icon" style="background: var(--gradient-orange)">
                            <i class="ri-money-dollar-circle-fill"></i>
                        </div>
                        <span class="quick-action-label">Fee Management</span>
                    </a>
                    <a class="quick-action-card" href="notices.html">
                        <div class="quick-action-icon" style="background: var(--gradient-accent)">
                            <i class="ri-notification-3-fill"></i>
                        </div>
                        <span class="quick-action-label">Post Notice</span>
                    </a>
                </div>

                <!-- Dashboard Grid -->
                <div class="dashboard-grid">
                    <!-- Recent Users -->
                    <div class="panel">
                        <h5 class="section-title"><i class="ri-user-add-fill"></i> Recent Users</h5>
                        <ul class="recent-list" id="recentUsersList">
                            <li class="loading-spinner">
                                <div class="spinner"></div>
                            </li>
                        </ul>
                    </div>

                    <!-- Fee Summary -->
                    <div class="panel">
                        <h5 class="section-title"><i class="ri-money-dollar-circle-fill"></i> Fee Overview</h5>
                        <div id="feeSummary">
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        // Guard: Admin only
        if (!initPage('Admin Dashboard', 'dashboard', 'Admin')) {
            // Will redirect
        } else {
            loadDashboardData();
        }

        async function loadDashboardData() {
            // Load stats
            loadAdminStats();
            loadRecentUsers();
            loadFeeSummary();
            loadCourseCount();
        }

        async function loadAdminStats() {
            try {
                const stats = await AuthManager.apiGet('/admin/stats');
                if (stats) {
                    animateValue('statStudents', stats.totalStudents || 0);
                    animateValue('statTeachers', stats.totalTeachers || 0);
                    animateValue('statUsers', stats.totalUsers || 0);
                }
            } catch (err) {
                console.error('Stats error:', err);
                document.getElementById('statStudents').textContent = '0';
                document.getElementById('statTeachers').textContent = '0';
                document.getElementById('statUsers').textContent = '0';
            }
        }

        async function loadCourseCount() {
            try {
                const courses = await AuthManager.apiGet('/course');
                const count = Array.isArray(courses) ? courses.length : 0;
                animateValue('statCourses', count);
            } catch {
                document.getElementById('statCourses').textContent = '0';
            }
        }

        async function loadRecentUsers() {
            try {
                const result = await AuthManager.apiGet('/admin/users?page=1&pageSize=6');
                const users = result?.data || result || [];
                const list = document.getElementById('recentUsersList');

                if (!users.length) {
                    list.innerHTML = '<li class="empty-state"><i class="ri-user-line"></i><p>No users found</p></li>';
                    return;
                }

                const gradients = ['var(--gradient-primary)', 'var(--gradient-green)', 'var(--gradient-blue)', 'var(--gradient-orange)', 'var(--gradient-accent)'];

                list.innerHTML = users.map((u, i) => `
                    <li class="recent-item">
                        <div class="recent-avatar" style="background: ${gradients[i % gradients.length]}">
                            ${(u.firstName?.[0] || 'U').toUpperCase()}
                        </div>
                        <div class="recent-info">
                            <div class="recent-name">${u.firstName || ''} ${u.lastName || ''}</div>
                            <div class="recent-meta">${u.email} · <span class="badge badge-info" style="font-size:0.6rem">${u.role}</span></div>
                        </div>
                    </li>
                `).join('');
            } catch (err) {
                console.error('Recent users error:', err);
                document.getElementById('recentUsersList').innerHTML = '<li class="empty-state"><p>Could not load users</p></li>';
            }
        }

        async function loadFeeSummary() {
            try {
                const summary = await AuthManager.apiGet('/fee/summary');
                const container = document.getElementById('feeSummary');

                const totalFees = summary?.totalFees || 0;
                const totalPaid = summary?.totalPaid || 0;
                const paidPercent = totalFees > 0 ? Math.round((totalPaid / totalFees) * 100) : 0;

                container.innerHTML = `
                    <div style="margin-bottom: var(--space-4)">
                        <div style="display:flex; justify-content:space-between; align-items:baseline">
                            <span style="font-size:0.85rem; font-weight:600">Collection Rate</span>
                            <span style="font-size:1.2rem; font-weight:700; color:var(--success)">${paidPercent}%</span>
                        </div>
                        <div class="fee-bar">
                            <div class="fee-bar-fill" style="width: ${paidPercent}%"></div>
                        </div>
                        <div class="fee-stats">
                            <span>Collected: ₹${totalPaid.toLocaleString()}</span>
                            <span>Total: ₹${totalFees.toLocaleString()}</span>
                        </div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); margin-top:var(--space-4)">
                        <div style="text-align:center; padding:var(--space-3); background:var(--bg-light); border-radius:var(--radius-lg)">
                            <div style="font-size:1.1rem; font-weight:700; color:var(--success)">${summary?.paidCount || 0}</div>
                            <div style="font-size:0.7rem; color:var(--text-muted)">Paid</div>
                        </div>
                        <div style="text-align:center; padding:var(--space-3); background:var(--bg-light); border-radius:var(--radius-lg)">
                            <div style="font-size:1.1rem; font-weight:700; color:var(--error)">${summary?.pendingCount || 0}</div>
                            <div style="font-size:0.7rem; color:var(--text-muted)">Pending</div>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error('Fee summary error:', err);
                document.getElementById('feeSummary').innerHTML = '<div class="empty-state"><p>Could not load fee data</p></div>';
            }
        }

        function animateValue(elementId, end, duration = 1000) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const start = 0;
            const range = end - start;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                el.textContent = Math.floor(start + range * eased);
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }
    </script>
</body>

</html>
