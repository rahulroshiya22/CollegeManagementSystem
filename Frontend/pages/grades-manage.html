<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Management - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .action-btn {
            padding: var(--space-1) var(--space-2);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-edit {
            background: var(--info-light);
            color: var(--info);
        }

        .btn-delete {
            background: var(--error-light);
            color: var(--error);
        }

        .grade-letter-badge {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-weight: 800;
            font-size: 0.8rem;
            color: white;
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <div class="action-bar">
                    <div class="search-bar">
                        <i class="ri-search-line"></i>
                        <input type="text" id="searchInput" placeholder="Search by student or course..."
                            oninput="filterGrades()">
                    </div>
                    <button class="btn btn-primary" onclick="openModal()"><i class="ri-add-fill"></i> Add Grade</button>
                </div>

                <div class="data-table-container">
                    <div class="data-table-header">
                        <h5 class="data-table-title">All Grades</h5>
                    </div>
                    <div style="overflow-x:auto">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Course</th>
                                    <th>Grade</th>
                                    <th>Marks</th>
                                    <th>Exam</th>
                                    <th>Sem</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="gradesBody">
                                <tr>
                                    <td colspan="7">
                                        <div class="loading-spinner">
                                            <div class="spinner"></div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="gradeModal">
        <div class="modal">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Grade</h5>
                <button class="modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
                    <div class="form-group"><label class="form-label">Student ID</label><input type="number"
                            class="form-input" id="studentId" required></div>
                    <div class="form-group"><label class="form-label">Course ID</label><input type="number"
                            class="form-input" id="courseId" required></div>
                </div>
                <div class="form-group"><label class="form-label">Course Name</label><input type="text"
                        class="form-input" id="courseName"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4)">
                    <div class="form-group"><label class="form-label">Marks Obtained</label><input type="number"
                            class="form-input" id="marks" required></div>
                    <div class="form-group"><label class="form-label">Total Marks</label><input type="number"
                            class="form-input" id="totalMarks" value="100" required></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-4)">
                    <div class="form-group"><label class="form-label">Exam Type</label>
                        <select class="form-input" id="examType">
                            <option>Midterm</option>
                            <option>Final</option>
                            <option>Internal</option>
                            <option>Assignment</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Semester</label><input type="number"
                            class="form-input" id="semester" min="1" max="8"></div>
                    <div class="form-group"><label class="form-label">Academic Year</label><input type="text"
                            class="form-input" id="academicYear" placeholder="2025-2026"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveGrade()">Save</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('Grade Management', 'grades', 'Admin')) { } else { loadGrades(); }

        let allGrades = [];
        const gradeColors = { 'A+': '#48bb78', 'A': '#48bb78', 'B+': '#4299e1', 'B': '#4299e1', 'C+': '#ecc94b', 'C': '#ecc94b', 'D': '#ed8936', 'F': '#f56565' };

        async function loadGrades() {
            try {
                const data = await AuthManager.apiGet('/grade');
                allGrades = Array.isArray(data) ? data : [];
                renderGrades(allGrades);
            } catch { document.getElementById('gradesBody').innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>Could not load grades</p></div></td></tr>'; }
        }

        function renderGrades(grades) {
            const tbody = document.getElementById('gradesBody');
            if (!grades.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>No grades</p></div></td></tr>'; return; }
            tbody.innerHTML = grades.map(g => `
                <tr>
                    <td><strong>Student #${g.studentId}</strong></td>
                    <td>${g.courseName || g.courseId}</td>
                    <td><span class="grade-letter-badge" style="background:${gradeColors[g.gradeLetter] || 'var(--primary)'}">${g.gradeLetter || '-'}</span></td>
                    <td>${g.marksObtained}/${g.totalMarks}</td>
                    <td>${g.examType || '-'}</td>
                    <td>${g.semester || '-'}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick='editGrade(${JSON.stringify(g)})'><i class="ri-pencil-fill"></i></button>
                        <button class="action-btn btn-delete" onclick="deleteGrade(${g.gradeId})"><i class="ri-delete-bin-fill"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterGrades() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderGrades(allGrades.filter(g => (g.courseName || '').toLowerCase().includes(q) || String(g.studentId).includes(q)));
        }

        function openModal() { document.getElementById('modalTitle').textContent = 'Add Grade'; document.getElementById('editId').value = ''; document.querySelectorAll('#gradeModal input:not([type=hidden])').forEach(i => i.value = i.id === 'totalMarks' ? '100' : ''); document.getElementById('gradeModal').classList.add('show'); }

        function editGrade(g) {
            document.getElementById('modalTitle').textContent = 'Edit Grade';
            document.getElementById('editId').value = g.gradeId;
            document.getElementById('studentId').value = g.studentId;
            document.getElementById('courseId').value = g.courseId;
            document.getElementById('courseName').value = g.courseName || '';
            document.getElementById('marks').value = g.marksObtained;
            document.getElementById('totalMarks').value = g.totalMarks;
            document.getElementById('examType').value = g.examType || 'Midterm';
            document.getElementById('semester').value = g.semester || '';
            document.getElementById('academicYear').value = g.academicYear || '';
            document.getElementById('gradeModal').classList.add('show');
        }

        function closeModal() { document.getElementById('gradeModal').classList.remove('show'); }

        async function saveGrade() {
            const id = document.getElementById('editId').value;
            const body = {
                studentId: parseInt(document.getElementById('studentId').value),
                courseId: parseInt(document.getElementById('courseId').value),
                courseName: document.getElementById('courseName').value,
                marksObtained: parseFloat(document.getElementById('marks').value),
                totalMarks: parseFloat(document.getElementById('totalMarks').value),
                examType: document.getElementById('examType').value,
                semester: parseInt(document.getElementById('semester').value) || null,
                academicYear: document.getElementById('academicYear').value || null
            };
            try {
                if (id) { await AuthManager.apiPut(`/grade/${id}`, body); showToast('Updated', 'success'); }
                else { await AuthManager.apiPost('/grade', body); showToast('Created', 'success'); }
                closeModal(); loadGrades();
            } catch (err) { showToast(err.message || 'Error', 'error'); }
        }

        async function deleteGrade(id) {
            if (!confirm('Delete?')) return;
            try { await AuthManager.apiDelete(`/grade/${id}`); showToast('Deleted', 'success'); loadGrades(); }
            catch (err) { showToast(err.message, 'error'); }
        }
    </script>
</body>

</html>
