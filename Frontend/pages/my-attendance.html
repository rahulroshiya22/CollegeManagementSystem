<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance - College Management System</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .attendance-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .overview-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-5);
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .overview-value {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
        }

        .overview-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: var(--space-1);
        }

        .course-attendance {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--space-4);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-3);
        }

        .ca-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-2);
        }

        .ca-name {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .ca-percent {
            font-weight: 800;
            font-size: 1rem;
        }

        .ca-bar {
            height: 8px;
            background: var(--bg-light);
            border-radius: var(--radius-full);
            overflow: hidden;
        }

        [data-theme="dark"] .ca-bar {
            background: rgba(255, 255, 255, 0.08);
        }

        .ca-bar-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 1s ease;
        }

        .ca-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: var(--space-1);
        }
    </style>
</head>

<body>
    <div class="layout">
        <div id="sidebarContainer"></div>
        <div class="main-content">
            <div id="headerContainer"></div>
            <div class="page-body">
                <div class="attendance-overview" id="overview">
                    <div class="overview-card">
                        <div class="overview-value" id="ovTotal">--</div>
                        <div class="overview-label">Total Classes</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-value" style="color:var(--success)" id="ovPresent">--</div>
                        <div class="overview-label">Present</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-value" style="color:var(--error)" id="ovAbsent">--</div>
                        <div class="overview-label">Absent</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-value" id="ovPercent">--%</div>
                        <div class="overview-label">Percentage</div>
                    </div>
                </div>
                <h5 style="font-weight:700;margin-bottom:var(--space-4)"><i class="ri-bar-chart-2-fill"
                        style="color:var(--primary)"></i> Course-wise Attendance</h5>
                <div id="courseAttendance">
                    <div class="loading-spinner">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/js/auth.js"></script>
    <script>
        if (!initPage('My Attendance', 'my-attendance', 'Student')) { } else { loadAttendance(); }
        async function loadAttendance() {
            const studentId = AuthManager.getUserId();
            try {
                const summary = await AuthManager.apiGet(`/attendance/student/${studentId}/summary`);
                document.getElementById('ovTotal').textContent = summary?.totalClasses || 0;
                document.getElementById('ovPresent').textContent = summary?.totalPresent || 0;
                document.getElementById('ovAbsent').textContent = (summary?.totalClasses || 0) - (summary?.totalPresent || 0);
                const pct = summary?.attendancePercentage ? Math.round(summary.attendancePercentage) : 0;
                document.getElementById('ovPercent').textContent = pct + '%';
                document.getElementById('ovPercent').style.color = pct >= 75 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
            } catch { }

            try {
                const records = await AuthManager.apiGet(`/attendance/student/${studentId}`);
                const list = Array.isArray(records) ? records : [];
                const courseMap = {};
                list.forEach(r => {
                    if (!courseMap[r.courseId]) courseMap[r.courseId] = { name: r.courseName || `Course ${r.courseId}`, total: 0, present: 0 };
                    courseMap[r.courseId].total++;
                    if (r.isPresent) courseMap[r.courseId].present++;
                });
                const container = document.getElementById('courseAttendance');
                const courses = Object.values(courseMap);
                if (!courses.length) { container.innerHTML = '<div class="empty-state"><p>No attendance data</p></div>'; return; }
                container.innerHTML = courses.map(c => {
                    const pct = c.total > 0 ? Math.round((c.present / c.total) * 100) : 0;
                    const color = pct >= 75 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
                    return `<div class="course-attendance">
                        <div class="ca-header"><span class="ca-name">${c.name}</span><span class="ca-percent" style="color:${color}">${pct}%</span></div>
                        <div class="ca-bar"><div class="ca-bar-fill" style="width:${pct}%;background:${color}"></div></div>
                        <div class="ca-meta">${c.present} present / ${c.total} classes</div>
                    </div>`;
                }).join('');
            } catch { document.getElementById('courseAttendance').innerHTML = '<div class="empty-state"><p>Could not load data</p></div>'; }
        }
    </script>
</body>

</html>
